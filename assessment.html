<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeopleIQ — HR Domain Assessments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f0;--ink:#111118;--card:#fff;--muted:#6b7076;--border:#e4e2db;
  --shadow:0 2px 16px rgba(17,17,24,.07);--shadow-lg:0 8px 40px rgba(17,17,24,.13);
  --ac:#00897b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* ── TOPBAR ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(247,245,240,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:60px}
.tlogo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;display:flex;align-items:center;gap:8px;color:var(--ink);text-decoration:none}
.tgem{width:20px;height:20px;background:var(--ink);border-radius:5px;display:grid;place-items:center}
.tgem-dot{width:8px;height:8px;background:var(--bg);border-radius:2px;display:block}
.tbback{font-size:.85rem;color:var(--muted);cursor:pointer;display:none;align-items:center;gap:6px;border:none;background:none;font-family:inherit;transition:color .2s;padding:0}
.tbback:hover{color:var(--ink)}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;padding-top:60px}
.screen.on{display:block}

/* ── HUB ── */
#hub{padding:56px 40px 80px}
.hub-head{max-width:600px;margin:0 auto 48px;text-align:center}
.eyebrow{display:inline-block;font-size:.74rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.hub-title{font-family:'Syne',sans-serif;font-size:clamp(1.9rem,5vw,3rem);font-weight:800;letter-spacing:-.025em;line-height:1.08;margin-bottom:14px}
.hub-sub{font-size:.97rem;color:var(--muted);line-height:1.7;max-width:460px;margin:0 auto}

.domain-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;max-width:1020px;margin:0 auto}
.dtile{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:30px;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;position:relative;overflow:hidden;text-decoration:none;display:block;color:var(--ink)}
.dtile:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.dtile-bar{width:100%;height:4px;border-radius:2px;margin-bottom:24px;transform:scaleX(.25);transform-origin:left;transition:transform .35s ease}
.dtile:hover .dtile-bar{transform:scaleX(1)}
.dtile-icon{font-size:2.1rem;margin-bottom:14px;display:block}
.dtile-name{font-family:'Syne',sans-serif;font-size:1.08rem;font-weight:700;margin-bottom:7px}
.dtile-desc{font-size:.86rem;color:var(--muted);line-height:1.6;margin-bottom:18px}
.dtile-foot{display:flex;align-items:center;justify-content:space-between}
.dtile-tags{display:flex;gap:5px;flex-wrap:wrap}
.dtile-tag{font-size:.69rem;font-weight:600;padding:2px 8px;border-radius:100px;background:var(--bg)}
.dtile-arrow{font-size:1.1rem;color:var(--muted);transition:transform .2s}
.dtile:hover .dtile-arrow{transform:translateX(4px)}
.dtile-done{position:absolute;top:14px;right:14px;font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:100px;background:#e8f5e9;color:#2e7d32;display:none}

/* ── QUIZ SCREEN ── */
#quiz{background:var(--bg)}
.quiz-wrap{display:grid;grid-template-columns:256px 1fr;min-height:calc(100vh - 60px)}

.qsidebar{background:var(--card);border-right:1px solid var(--border);padding:28px 20px;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.qs-dname{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:4px}
.qs-dsub{font-size:.74rem;color:var(--muted);margin-bottom:18px;line-height:1.4}
.qs-step{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:9px;font-size:.79rem;color:var(--muted);transition:background .15s}
.qs-step.cur{background:var(--bg);color:var(--ink);font-weight:600}
.qs-step.done{color:var(--ink)}
.qs-num{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:grid;place-items:center;font-size:.67rem;font-weight:700;flex-shrink:0;color:var(--muted);transition:all .15s}
.qs-step.cur .qs-num{border-color:var(--ac);color:var(--ac)}
.qs-step.done .qs-num{background:var(--ink);border-color:var(--ink);color:#f7f5f0}
.qs-area{font-size:.79rem;line-height:1.3}
.qs-foot{margin-top:auto;padding-top:16px;border-top:1px solid var(--border)}
.qs-barlabel{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.qs-bartrack{height:5px;background:var(--bg);border-radius:100px;overflow:hidden}
.qs-barfill{height:100%;border-radius:100px;transition:width .4s ease}
.qs-pct{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-top:5px}

.qmain{padding:44px 52px;max-width:720px}
.qa-top{font-size:.73rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin-bottom:13px}
.qa-q{font-family:'Syne',sans-serif;font-size:clamp(1.1rem,2.5vw,1.38rem);font-weight:700;letter-spacing:-.015em;line-height:1.35;margin-bottom:9px}
.qa-hint{font-size:.85rem;color:var(--muted);margin-bottom:26px;line-height:1.5}

.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:15px 17px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .14s}
.opt:hover{border-color:#aaa;background:#fafaf8}
.opt.sel{background:color-mix(in srgb,var(--ac) 6%,white);border-color:var(--ac)}
.opt.best{border-color:#2e7d32;background:#f0f8f0}
.opt.miss{border-color:#c62828;background:#fef6f6}
.opt.lock{pointer-events:none}
.opt-key{width:26px;height:26px;border-radius:6px;flex-shrink:0;border:1.5px solid var(--border);display:grid;place-items:center;font-size:.69rem;font-weight:700;color:var(--muted);transition:all .14s}
.opt.sel .opt-key{border-color:var(--ac);color:var(--ac)}
.opt.best .opt-key{border-color:#2e7d32;color:#2e7d32;background:#e8f5e9}
.opt.miss .opt-key{border-color:#c62828;color:#c62828}
.opt-text{font-size:.89rem;line-height:1.45;padding-top:1px}

.scale-wrap{display:flex;flex-direction:column;gap:11px}
.scale-btns{display:flex;gap:7px}
.sbtn{flex:1;padding:13px 4px;border-radius:9px;border:1.5px solid var(--border);background:var(--card);text-align:center;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .14s;color:var(--muted);font-family:inherit}
.sbtn:hover{border-color:#aaa;color:var(--ink)}
.sbtn.on{border-color:var(--ac);color:var(--ac);background:color-mix(in srgb,var(--ac) 6%,white)}
.scale-ends{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted)}

.insight{margin-top:16px;padding:15px 17px;border-radius:11px;background:#fffde7;border:1px solid #f9a825;display:none;gap:11px;align-items:flex-start}
.insight.on{display:flex}
.ins-ico{font-size:1.1rem;flex-shrink:0;padding-top:1px}
.ins-head{font-size:.69rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#e65100;margin-bottom:4px}
.ins-text{font-size:.83rem;line-height:1.65;color:#5d4037}
.ins-bench{margin-top:7px;font-size:.77rem;font-weight:600;color:#1b5e20}

.qfoot{display:flex;align-items:center;justify-content:space-between;padding-top:26px;margin-top:28px;border-top:1px solid var(--border)}
.qdots{display:flex;gap:4px}
.qdot{width:5px;height:5px;border-radius:50%;background:var(--border)}
.qdot.on{background:var(--ink)}
.qdot.cur{background:var(--muted);width:14px;border-radius:3px}
.btn-next{background:var(--ink);color:#f7f5f0;padding:12px 28px;border-radius:100px;font-size:.9rem;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .2s}
.btn-next:disabled{opacity:.3;cursor:not-allowed}
.btn-next:not(:disabled):hover{transform:translateY(-1px)}

/* ── RESULTS ── */
#results{background:var(--bg)}
.res-wrap{max-width:920px;margin:0 auto;padding:44px 38px 80px}

.score-hero{background:var(--card);border:1.5px solid var(--border);border-radius:22px;padding:36px;margin-bottom:24px;display:flex;align-items:center;gap:36px;flex-wrap:wrap}
.sh-ring{position:relative;width:136px;height:136px;flex-shrink:0}
.sh-ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg);stroke-width:10}
.ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.25,.46,.45,.94)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;line-height:1}
.ring-lbl{font-size:.68rem;color:var(--muted);margin-top:2px}
.sh-body{flex:1}
.sh-dom{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.sh-lvl{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;letter-spacing:-.02em;margin-bottom:8px;line-height:1.1}
.sh-desc{font-size:.88rem;color:var(--muted);line-height:1.65;max-width:460px}

.slabel{font-size:.69rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;margin-top:28px}
.subcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.subcard{background:var(--card);border:1.5px solid var(--border);border-radius:13px;padding:16px}
.sc-lbl{font-size:.67rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:7px}
.sc-val{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;line-height:1;margin-bottom:5px}
.sc-bar{height:4px;background:var(--bg);border-radius:100px;overflow:hidden;margin-bottom:5px}
.sc-fill{height:100%;border-radius:100px;transition:width .8s ease}
.sc-stat{font-size:.71rem;color:var(--muted)}

.gaps{display:flex;flex-direction:column;gap:13px}
.gcard{background:var(--card);border:1.5px solid var(--border);border-radius:15px;padding:22px;display:flex;gap:16px;transition:border-color .2s}
.gcard:hover{border-color:#bbb}
.gico{width:42px;height:42px;border-radius:11px;flex-shrink:0;display:grid;place-items:center;font-size:1.2rem}
.gbody{flex:1}
.gprio{font-size:.67rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.gtitle{font-family:'Syne',sans-serif;font-size:.93rem;font-weight:700;margin-bottom:5px}
.gtext{font-size:.83rem;color:var(--muted);line-height:1.6}
.gsteps{margin-top:9px;display:flex;flex-direction:column;gap:5px}
.gstep{font-size:.79rem;display:flex;align-items:flex-start;gap:7px;line-height:1.4}
.gsn{width:17px;height:17px;border-radius:50%;background:var(--bg);font-size:.61rem;font-weight:700;display:grid;place-items:center;flex-shrink:0;margin-top:1px}
.gimpact{display:inline-flex;align-items:center;gap:4px;margin-top:9px;font-size:.75rem;font-weight:600;padding:3px 9px;border-radius:100px;background:var(--bg)}

.strgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.strcard{background:var(--card);border:1.5px solid var(--border);border-radius:13px;padding:16px;display:flex;gap:10px;align-items:flex-start}
.str-ic{font-size:1.2rem;flex-shrink:0}
.str-t{font-size:.85rem;font-weight:600;margin-bottom:3px}
.str-d{font-size:.78rem;color:var(--muted);line-height:1.55}

.rescta{background:var(--ink);color:#f7f5f0;border-radius:18px;padding:32px 36px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-top:28px}
.rcta-t{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:5px}
.rcta-s{font-size:.84rem;color:rgba(247,245,240,.55);line-height:1.5}
.rcta-btns{display:flex;gap:9px;flex-wrap:wrap;flex-shrink:0}
.btn-lt{background:#f7f5f0;color:var(--ink);padding:11px 22px;border-radius:100px;font-size:.86rem;font-weight:700;text-decoration:none;transition:transform .2s;display:inline-block;white-space:nowrap}
.btn-lt:hover{transform:translateY(-2px)}
.btn-gh{background:transparent;color:rgba(247,245,240,.6);border:1.5px solid rgba(247,245,240,.18);padding:11px 22px;border-radius:100px;font-size:.86rem;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:border-color .2s}
.btn-gh:hover{border-color:rgba(247,245,240,.4);color:#f7f5f0}

/* Try another domain strip */
.more-domains{margin-top:20px}
.more-label{font-size:.69rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.more-grid{display:flex;gap:10px;flex-wrap:wrap}
.more-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:100px;border:1.5px solid var(--border);background:var(--card);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;color:var(--ink)}
.more-btn:hover{border-color:#aaa;background:#fafaf8}
.more-btn.completed{background:#f0f8f0;border-color:#a5d6a7;color:#2e7d32}

/* Toast */
.toast{position:fixed;bottom:22px;right:22px;z-index:99;background:var(--ink);color:#f7f5f0;padding:11px 18px;border-radius:11px;font-size:.83rem;font-weight:500;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow-lg);transform:translateY(64px);opacity:0;transition:all .4s cubic-bezier(.175,.885,.32,1.275)}
.toast.on{transform:translateY(0);opacity:1}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.qa-anim{animation:fadeUp .28s ease both}

@media(max-width:760px){
  .topbar{padding:0 20px}
  .quiz-wrap{grid-template-columns:1fr}
  .qsidebar{display:none}
  .qmain{padding:20px 18px}
  #hub{padding:36px 16px 60px}
  .res-wrap{padding:28px 16px 60px}
  .score-hero{flex-direction:column;gap:20px}
  .rescta{flex-direction:column}
}
</style>
</head>
<body>

<div class="topbar">
  <a class="tlogo" href="index.html"><div class="tgem"><span class="tgem-dot"></span></div>PeopleIQ</a>
  <button class="tbback" id="tbback" onclick="goHub()">← All Assessments</button>
</div>

<!-- HUB -->
<div class="screen on" id="hub">
  <div class="hub-head">
    <div class="eyebrow">HR Strategy Assessments</div>
    <h1 class="hub-title">Pick your domain</h1>
    <p class="hub-sub">Each assessment is 10 focused questions — about 5 minutes. You'll get a specific gap analysis and prioritised action steps based on your answers.</p>
  </div>
  <div class="domain-grid" id="domain-grid"></div>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz">
  <div class="quiz-wrap">
    <div class="qsidebar" id="qsidebar">
      <div class="qs-dname" id="qs-dname"></div>
      <div class="qs-dsub">Complete all 10 to see your gap analysis</div>
      <div class="qs-foot">
        <div class="qs-barlabel">Progress</div>
        <div class="qs-bartrack"><div class="qs-barfill" id="qs-fill" style="width:0%"></div></div>
        <div class="qs-pct" id="qs-pct">0%</div>
      </div>
    </div>
    <div class="qmain">
      <div id="qa-block">
        <div class="qa-top" id="qa-top"></div>
        <div class="qa-q" id="qa-q"></div>
        <div class="qa-hint" id="qa-hint"></div>
        <div id="qa-input"></div>
        <div class="insight" id="qa-insight">
          <div class="ins-ico">💡</div>
          <div>
            <div class="ins-head">Industry Insight</div>
            <div class="ins-text" id="ins-text"></div>
            <div class="ins-bench" id="ins-bench"></div>
          </div>
        </div>
      </div>
      <div class="qfoot">
        <div class="qdots" id="qdots"></div>
        <button class="btn-next" id="btn-next" disabled onclick="nextQ()">Continue →</button>
      </div>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="results">
  <div class="res-wrap" id="res-wrap"></div>
</div>

<div class="toast" id="toast"><span id="tico"></span><span id="tmsg"></span></div>

<script>
// ═══════════════════════════════════════════════
//  DOMAIN DATA
// ═══════════════════════════════════════════════
const DOMAINS = [
  {
    id:'attrition', name:'Attrition & Retention', icon:'📉', color:'#00897b',
    desc:'Understand why people leave and how to keep your best talent longer.',
    tags:['Exit Analysis','Flight Risk','Cost Tracking'],
    qs:[
      { area:'Exit Process', cat:'Exit Intelligence', type:'mcq',
        q:'When an employee hands in their notice, what typically happens next?',
        hint:'Think about your last 5 departures — what was the actual process?',
        opts:[
          {t:'Structured HR exit interview conducted within 2 weeks; data entered into a tracking system and themes reviewed quarterly',s:4},
          {t:'Informal conversation with HR or manager, sometimes written down',s:3},
          {t:'We ask a few questions but rarely record answers formally',s:2},
          {t:'We process the resignation and focus on replacing the role',s:0},
        ],
        insight:'32% of HR teams track exit reasons systematically. Those who do and act on the patterns reduce attrition by 23% within 12 months.',
        bench:'📊 Top-quartile orgs conduct structured exit analysis for 90%+ of departures',
      },
      { area:'Attrition Measurement', cat:'Data & Tracking', type:'mcq',
        q:'How do you calculate and review your voluntary attrition rate?',
        opts:[
          {t:'Calculated monthly, broken down by department, manager, level, and tenure — reviewed in leadership meetings',s:4},
          {t:'Calculated quarterly or annually and shared with HR leadership',s:3},
          {t:'We know the overall number but don\'t break it down meaningfully',s:2},
          {t:'We don\'t formally calculate a voluntary attrition rate',s:0},
        ],
        insight:'A single company-wide number hides the real story. Segmented data reveals which managers, teams, and tenure bands are driving turnover — and where to focus.',
        bench:'📊 Companies lose 47% more talent from the 1–2 year tenure band than they typically realise',
      },
      { area:'Root Cause Clarity', cat:'Root Cause', type:'scale',
        scaleMin:'No real idea', scaleMax:'Data-backed certainty',
        q:'How confident are you that you know the real top 3 reasons people leave your organisation?',
        insight:'Top 2024 exit drivers: lack of career growth (41%), manager relationship (38%), below-market pay (34%), burnout (29%). Guessing leads to wrong, expensive interventions.',
        bench:'📊 68% of HR leaders overestimate pay as the driver while underweighting manager quality',
      },
      { area:'Financial Quantification', cat:'Business Case', type:'mcq',
        q:'Do you formally calculate the total cost of each employee departure?',
        opts:[
          {t:'Yes — full cost including recruitment, onboarding, lost productivity, knowledge loss, and team disruption',s:4},
          {t:'We estimate recruitment and onboarding costs only',s:3},
          {t:'We use a rough rule of thumb like "1× annual salary"',s:2},
          {t:'We don\'t formally track the financial cost of losing an employee',s:0},
        ],
        insight:'True replacement cost = 50–200% of annual salary when all factors are included. Quantifying this creates the business case for retention investment.',
        bench:'📊 HR teams that quantify attrition cost are 2.4× more likely to receive retention budget',
      },
      { area:'Predictive Capability', cat:'Early Warning', type:'mcq',
        q:'How do you spot employees who might be planning to leave before they resign?',
        opts:[
          {t:'Predictive model using engagement, performance, tenure, pay gaps, and absence data — with automated manager alerts',s:4},
          {t:'Manager check-ins and informal signals logged in a flight-risk register',s:3},
          {t:'Annual engagement scores used as a rough proxy',s:2},
          {t:'We find out when they hand in their notice',s:0},
        ],
        insight:'Predictive attrition models identify 70–80% of resignations 60–90 days in advance — giving managers a meaningful window to intervene before the decision is final.',
        bench:'📊 22% of Fortune 500 companies now use predictive attrition scoring at manager level',
      },
      { area:'Manager Readiness', cat:'Manager Capability', type:'mcq',
        q:'How equipped are your managers to have effective retention conversations?',
        opts:[
          {t:'Trained in retention conversations, with access to team engagement data and coaching support',s:4},
          {t:'Some managers are naturally good at this; quality varies significantly',s:3},
          {t:'Managers escalate to HR when they sense someone might leave',s:2},
          {t:'Managers have no specific training or support for retention',s:0},
        ],
        insight:'Manager quality explains 38% of variance in individual attrition rates. Equipping managers with data and conversation skills is the single highest-leverage retention action.',
        bench:'📊 Teams with trained, data-equipped managers have 28% lower attrition than reactive teams',
      },
      { area:'Intervention Speed', cat:'Responsiveness', type:'scale',
        scaleMin:'No process — slow or ad hoc', scaleMax:'Fast, structured protocol within days',
        q:'When you identify a flight risk, how quickly can your organisation respond?',
        insight:'60% of employees who signal intent to leave and receive a meaningful conversation within 2 weeks stay for at least 12 more months.',
        bench:'📊 Average intervention lag: reactive orgs = 6 weeks, data-driven orgs = 8 days',
      },
      { area:'New Hire Risk', cat:'Onboarding Retention', type:'mcq',
        q:'How do you manage attrition risk during the critical first 90 days for new hires?',
        opts:[

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let activeDomain = null;
let currentQ = 0;
let answers = [];
let answered = false;
let completedDomains = {};

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function init() {
  buildHub();
  // Check if a domain was pre-selected from the main site
  const preSelected = sessionStorage.getItem('startDomain');
  if (preSelected) {
    sessionStorage.removeItem('startDomain');
    const idx = DOMAINS.findIndex(d => d.id === preSelected);
    if (idx !== -1) {
      setTimeout(() => startDomain(idx), 100);
      return;
    }
  }
}

// ═══════════════════════════════════════════════
//  BUILD HUB
// ═══════════════════════════════════════════════
function buildHub() {
  const grid = document.getElementById('domain-grid');
  grid.innerHTML = '';
  DOMAINS.forEach((d, i) => {
    const tile = document.createElement('div');
    tile.className = 'dtile';
    tile.id = 'tile-' + d.id;
    tile.onclick = () => startDomain(i);
    tile.innerHTML = `
      <div class="dtile-done" id="done-${d.id}">✓ Done</div>
      <div class="dtile-bar" style="background:${d.color}"></div>
      <span class="dtile-icon">${d.icon}</span>
      <div class="dtile-name">${d.name}</div>
      <div class="dtile-desc">${d.desc}</div>
      <div class="dtile-foot">
        <div class="dtile-tags">${d.tags.map(t=>`<span class="dtile-tag" style="color:${d.color}">${t}</span>`).join('')}</div>
        <div class="dtile-arrow">→</div>
      </div>`;
    grid.appendChild(tile);
  });
}

// ═══════════════════════════════════════════════
//  START DOMAIN
// ═══════════════════════════════════════════════
function startDomain(idx) {
  activeDomain = idx;
  currentQ = 0;
  answers = new Array(DOMAINS[idx].qs.length);
  answered = false;
  const d = DOMAINS[idx];
  document.body.style.setProperty('--ac', d.color);
  document.getElementById('qs-dname').textContent = d.name;
  document.getElementById('qs-fill').style.background = d.color;
  document.getElementById('tbback').style.display = 'flex';
  buildSidebar();
  show('quiz');
  renderQ();
}

// ═══════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════
function buildSidebar() {
  const sb = document.getElementById('qsidebar');
  sb.querySelectorAll('.qs-step').forEach(e => e.remove());
  const foot = sb.querySelector('.qs-foot');
  DOMAINS[activeDomain].qs.forEach((q, i) => {
    const el = document.createElement('div');
    el.className = 'qs-step';
    el.id = 'qss-' + i;
    el.innerHTML = `<div class="qs-num">${i+1}</div><div class="qs-area">${q.area}</div>`;
    sb.insertBefore(el, foot);
  });
  updateSidebar();
}

function updateSidebar() {
  const done = answers.filter(a => a !== undefined).length;
  const pct = Math.round((done / DOMAINS[activeDomain].qs.length) * 100);
  document.getElementById('qs-fill').style.width = pct + '%';
  document.getElementById('qs-pct').textContent = pct + '%';
  document.querySelectorAll('.qs-step').forEach((el, i) => {
    el.classList.toggle('cur', i === currentQ);
    el.classList.toggle('done', answers[i] !== undefined && i !== currentQ);
  });
}

// ═══════════════════════════════════════════════
//  RENDER QUESTION
// ═══════════════════════════════════════════════
function renderQ() {
  answered = false;
  document.getElementById('btn-next').disabled = true;
  document.getElementById('qa-insight').classList.remove('on');
  const d = DOMAINS[activeDomain];
  const q = d.qs[currentQ];
  const top = document.getElementById('qa-top');
  top.textContent = `${d.icon} ${d.name}  ·  ${q.cat}  ·  Q${currentQ+1} of ${d.qs.length}`;
  top.style.color = d.color;
  document.getElementById('qa-q').textContent = q.q;
  document.getElementById('qa-hint').textContent = q.hint || '';

  // Progress dots
  const dots = document.getElementById('qdots');
  dots.innerHTML = '';
  d.qs.forEach((_, i) => {
    const dot = document.createElement('div');
    const isDone = answers[i] !== undefined && i < currentQ;
    dot.className = 'qdot' + (isDone ? ' on' : '') + (i === currentQ ? ' cur' : '');
    dots.appendChild(dot);
  });

  const area = document.getElementById('qa-input');
  area.innerHTML = '';
  if (q.type === 'mcq') buildMCQ(q, area);
  else buildScale(q, area);

  // Animate in
  const block = document.getElementById('qa-block');
  block.classList.remove('qa-anim');
  void block.offsetWidth;
  block.classList.add('qa-anim');
  updateSidebar();
}

function buildMCQ(q, area) {
  const wrap = document.createElement('div');
  wrap.className = 'opts';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, i) => {
    const el = document.createElement('div');
    el.className = 'opt';
    el.innerHTML = `<div class="opt-key">${letters[i]}</div><div class="opt-text">${opt.t}</div>`;
    el.onclick = () => {
      if (answered) return;
      answered = true;
      const maxScore = q.opts[0].s;
      wrap.querySelectorAll('.opt').forEach((o, oi) => {
        o.classList.add('lock');
        if (oi === i) o.classList.add(opt.s === maxScore ? 'best sel' : 'miss');
        else if (oi === 0 && opt.s !== maxScore) o.classList.add('best');
      });
      answers[currentQ] = opt.s;
      showInsight(q);
      document.getElementById('btn-next').disabled = false;
      const pct = Math.round((opt.s / maxScore) * 100);
      showToast(pct === 100 ? '🏆' : pct >= 50 ? '👍' : '📌',
                pct === 100 ? 'Best practice! Well done.' : pct >= 50 ? 'Developing area — see insight below' : 'Gap identified — read the insight');
    };
    wrap.appendChild(el);
  });
  area.appendChild(wrap);
}

function buildScale(q, area) {
  const d = DOMAINS[activeDomain];
  const wrap = document.createElement('div');
  wrap.className = 'scale-wrap';
  const btnsDiv = document.createElement('div');
  btnsDiv.className = 'scale-btns';
  for (let v = 1; v <= 5; v++) {
    const btn = document.createElement('button');
    btn.className = 'sbtn';
    btn.textContent = v;
    btn.onclick = () => {
      if (answered) return;
      answered = true;
      btnsDiv.querySelectorAll('.sbtn').forEach(b => { b.classList.remove('on'); b.disabled = true; });
      btn.classList.add('on');
      answers[currentQ] = v - 1; // 0–4
      showInsight(q);
      document.getElementById('btn-next').disabled = false;
      showToast(v >= 4 ? '🏆' : v >= 3 ? '👍' : '📌',
                v >= 4 ? 'Strong performance here!' : v >= 3 ? 'Room to grow — see the insight' : 'This is a key gap — read the insight');
    };
    btnsDiv.appendChild(btn);
  }
  const ends = document.createElement('div');
  ends.className = 'scale-ends';
  ends.innerHTML = `<span>${q.scaleMin}</span><span>${q.scaleMax}</span>`;
  wrap.appendChild(btnsDiv);
  wrap.appendChild(ends);
  area.appendChild(wrap);
}

function showInsight(q) {
  document.getElementById('ins-text').textContent = q.insight;
  document.getElementById('ins-bench').innerHTML = q.bench ? `📈 ${q.bench}` : '';
  document.getElementById('qa-insight').classList.add('on');
}

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
function nextQ() {
  if (!answered) return;
  const d = DOMAINS[activeDomain];
  if (currentQ < d.qs.length - 1) {
    currentQ++;
    renderQ();
  } else {
    showResults();
  }
}

function goHub() {
  show('hub');
  document.getElementById('tbback').style.display = 'none';
}

// ═══════════════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════════════
function showResults() {
  // Mark as completed
  const doneEl = document.getElementById('done-' + DOMAINS[activeDomain].id);
  if (doneEl) doneEl.style.display = 'block';
  completedDomains[activeDomain] = true;
  document.getElementById('tbback').style.display = 'flex';

  const d = DOMAINS[activeDomain];
  const qs = d.qs;
  const maxPerQ = qs.map(q => q.type === 'mcq' ? q.opts[0].s : 4);
  const totalMax = maxPerQ.reduce((s, v) => s + v, 0);
  const totalScore = answers.reduce((s, v, i) => s + (v || 0), 0);
  const pct = Math.round((totalScore / totalMax) * 100);

  // Per-area scores
  const areaScores = qs.map((q, i) => ({
    area: q.area,
    pct: Math.round(((answers[i] || 0) / maxPerQ[i]) * 100)
  }));
  const sorted = [...areaScores].sort((a, b) => a.pct - b.pct);
  const gaps = sorted.filter(a => a.pct < 60);
  const strengths = sorted.filter(a => a.pct >= 75);

  // Maturity level
  const levels = [
    { min:0, max:35, label:'Foundation Stage', emoji:'🌱', color:'#c62828' },
    { min:36, max:60, label:'Developing Stage', emoji:'📈', color:'#e65100' },
    { min:61, max:80, label:'Advancing Stage',  emoji:'🚀', color: d.color },
    { min:81, max:100,label:'High Performance', emoji:'🏆', color:'#1b5e20' },
  ];
  const lv = levels.find(l => pct >= l.min && pct <= l.max) || levels[0];

  const wrap = document.getElementById('res-wrap');
  wrap.innerHTML = `
    <!-- Score hero -->
    <div class="score-hero">
      <div class="sh-ring">
        <svg width="136" height="136" viewBox="0 0 136 136">
          <circle class="ring-bg" cx="68" cy="68" r="54"/>
          <circle class="ring-fill" id="ring-fill" cx="68" cy="68" r="54"
            stroke="${d.color}" stroke-dasharray="339.3" stroke-dashoffset="339.3"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" id="ring-pct" style="color:${d.color}">0%</div>
          <div class="ring-lbl">Score</div>
        </div>
      </div>
      <div class="sh-body">
        <div class="sh-dom" style="color:${d.color}">${d.icon} ${d.name}</div>
        <div class="sh-lvl">${lv.emoji} ${lv.label}</div>
        <div class="sh-desc">${getLevelDesc(pct, d.id)}</div>
      </div>
    </div>

    <!-- Per-area breakdown -->
    <div class="slabel">Performance by Area</div>
    <div class="subcards" id="subcards"></div>

    ${gaps.length > 0 ? `
    <div class="slabel" style="margin-top:28px">🔴 Identified Gaps &amp; Priority Actions</div>
    <div class="gaps" id="gaplist"></div>` : `
    <div class="slabel" style="color:#2e7d32;margin-top:28px">✅ No Critical Gaps — Strong Performance Across All Areas</div>`}

    ${strengths.length > 0 ? `
    <div class="slabel">✅ Your Strengths</div>
    <div class="strgrid" id="strlist"></div>` : ''}

    <!-- Try other domains -->
    <div class="more-domains">
      <div class="more-label">Continue with another domain</div>
      <div class="more-grid" id="more-grid"></div>
    </div>

    <!-- CTA -->
    <div class="rescta">
      <div>
        <div class="rcta-t">Ready to act on these insights?</div>
        <div class="rcta-s">Get a full diagnostic report, 90-day roadmap, and expert session for ${d.name}.</div>
      </div>
      <div class="rcta-btns">
        <a href="index.html" class="btn-lt">← Back to PeopleIQ</a>
        <button class="btn-gh" onclick="goHub()">Try Another Domain</button>
        <button class="btn-gh" onclick="startDomain(${activeDomain})">↩ Retake This</button>
      </div>
    </div>`;

  // Fill area cards
  const sc = document.getElementById('subcards');
  areaScores.forEach(a => {
    const card = document.createElement('div');
    card.className = 'subcard';
    card.innerHTML = `
      <div class="sc-lbl">${a.area}</div>
      <div class="sc-val" style="color:${scoreColor(a.pct)}">${a.pct}%</div>
      <div class="sc-bar"><div class="sc-fill" style="width:0%;background:${scoreColor(a.pct)}" data-w="${a.pct}"></div></div>
      <div class="sc-stat">${scoreLabel(a.pct)}</div>`;
    sc.appendChild(card);
  });

  // Fill gaps
  const gl = document.getElementById('gaplist');
  if (gl) {
    gaps.slice(0, 5).forEach((g, rank) => {
      const prio = rank === 0 ? 'Critical — Act Now' : rank === 1 ? 'High Priority' : 'Medium Priority';
      const pc = rank === 0 ? '#c62828' : rank === 1 ? '#e65100' : '#f9a825';
      const rec = RECS[g.area] || { icon:'⚠️', title:'Address This Gap', text:'This area scored below benchmark and needs attention.', steps:['Review current practices','Set a measurable 90-day target','Assign clear ownership'], impact:'Addressing gaps typically improves maturity by 15–25 points' };
      const card = document.createElement('div');
      card.className = 'gcard';
      card.innerHTML = `
        <div class="gico" style="background:color-mix(in srgb,${pc} 10%,white)">${rec.icon}</div>
        <div class="gbody">
          <div class="gprio" style="color:${pc}">${prio}  ·  ${g.area}  ·  Score: ${g.pct}%</div>
          <div class="gtitle">${rec.title}</div>
          <div class="gtext">${rec.text}</div>
          <div class="gsteps">
            ${rec.steps.map((s, i) => `<div class="gstep"><div class="gsn">${i+1}</div>${s}</div>`).join('')}
          </div>
          <div class="gimpact" style="color:${d.color}">⚡ ${rec.impact}</div>
        </div>`;
      gl.appendChild(card);
    });
  }

  // Fill strengths
  const sl = document.getElementById('strlist');
  if (sl) {
    strengths.forEach(s => {
      const card = document.createElement('div');
      card.className = 'strcard';
      card.innerHTML = `
        <div class="str-ic">✅</div>
        <div>
          <div class="str-t">${s.area}</div>
          <div class="str-d">Scoring ${s.pct}% — above the industry benchmark. Keep investing here and consider sharing this practice internally.</div>
        </div>`;
      sl.appendChild(card);
    });
  }

  // More domains
  const mg = document.getElementById('more-grid');
  if (mg) {
    DOMAINS.forEach((dom, i) => {
      if (i === activeDomain) return;
      const btn = document.createElement('button');
      btn.className = 'more-btn' + (completedDomains[i] ? ' completed' : '');
      btn.innerHTML = `${dom.icon} ${dom.name}${completedDomains[i] ? ' ✓' : ''}`;
      btn.onclick = () => startDomain(i);
      mg.appendChild(btn);
    });
  }

  show('results');

  // Animate ring
  const circ = 339.3;
  const rf = document.getElementById('ring-fill');
  if (rf) {
    rf.style.strokeDashoffset = circ;
    setTimeout(() => { rf.style.strokeDashoffset = circ * (1 - pct / 100); }, 300);
  }
  let dp = 0;
  const iv = setInterval(() => {
    dp = Math.min(dp + 1, pct);
    const el = document.getElementById('ring-pct');
    if (el) el.textContent = dp + '%';
    if (dp >= pct) clearInterval(iv);
  }, 16);

  // Animate sub-card bars
  setTimeout(() => {
    document.querySelectorAll('.sc-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 500);

  showToast('🎉', `${d.name} complete — ${pct}% · ${lv.label}`);
}

// ═══════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════
function scoreColor(pct) {
  if (pct >= 75) return '#2e7d32';
  if (pct >= 55) return '#e65100';
  return '#c62828';
}

function scoreLabel(pct) {
  if (pct >= 75) return '✅ Strong';
  if (pct >= 55) return '🟡 Developing';
  if (pct >= 35) return '🟠 Needs Work';
  return '🔴 Critical Gap';
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo(0, 0);
}

function showToast(icon, msg) {
  document.getElementById('tico').textContent = icon;
  document.getElementById('tmsg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 3000);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (!document.getElementById('quiz').classList.contains('on')) return;
  if (e.key === 'Enter' && !document.getElementById('btn-next').disabled) { nextQ(); return; }
  const keyMap = { a:0, b:1, c:2, d:3, A:0, B:1, C:2, D:3 };
  if (keyMap[e.key] !== undefined && !answered) {
    const q = DOMAINS[activeDomain]?.qs[currentQ];
    if (q?.type === 'mcq') {
      const opts = document.querySelectorAll('.opt');
      if (opts[keyMap[e.key]]) opts[keyMap[e.key]].click();
    }
  }
});

// Start
init();
</script>
